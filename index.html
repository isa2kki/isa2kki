<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="/favicon.png">

        

    <meta charset="UTF-8">
    <title>Isa</title>
    <style>
        @font-face {
            font-family: Yume2kki;
            src: url('yummy nickels.ttf');
        }
        body 
        {
            font-family: 'Yume2kki', sans-serif;
            height: 100vh;
            margin: 0;
            background-image: url("images/YumeBG3.png");
            color: white;
            text-align: center;
            padding: 0px;
        }
        img {
            transition: 0.2s;
            cursor: pointer;
            width: 200px;
            height: 200px;
            padding: 15px;
            object-fit: contain;
            
            margin: 0 auto;

            border: 20px solid transparent;
            border-image: url("images/2kkiborder2.png") 35 stretch;
            background-color: black;

            overflow: hidden; /* important */
        }

        img:hover {
            transform: scale(1.05);
            opacity: 1;
        }

        h1 {
            font-size: 5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 2em;
        }

        .subtitle {
            font-size: 1.5em;
        }
        
        .socials {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-align: center;
        }

        .socials p {
            margin: 0 0 5px 0;
            opacity: 0.8;
        }
        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 5px #ffffff;
            }
            50% {
                box-shadow: 0 0 20px #ffffff;
            }
            100% {
                box-shadow: 0 0 5px #ffffff;
        }
        }

        .enter {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border: 3px solid white;
            transition: 0.2s;
        }

        .enter:hover {
            animation: glowPulse 1.5s infinite;
            transform: scale(1.05);
        }

        a {
            display: inline;
            color: #ffffff;
            text-decoration: none;
            font-size: 2.5em;
        }

        @media (max-width: 760px) {
            
        }
    </style>
</head>

<body>

    <h1 style="color: #002244;">Isa2kki</h1>

    <p class="subtitle">Welcome to my page!</p>

    <a href="home.html">
        <img src="images/Urovershown.png" style="
        display: block;
        width: 200px;
        margin: 10px auto
        ">
    </a>
    <a href="home.html" class="enter">Enter</a>

</body>
</html>
